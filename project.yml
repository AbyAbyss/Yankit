name: ipaste

options:
  bundleIdPrefix: com.ipaste
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.29.0"
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"

targets:
  ipaste:
    type: application
    platform: macOS
    sources:
      - Sources
      - Resources/Assets.xcassets
    dependencies:
      - package: GRDB
      - package: KeyboardShortcuts
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ipaste.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.9"

  ipasteTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: ipaste
      - package: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ipaste.app.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.9"

schemes:
  ipaste:
    build:
      targets:
        ipaste: all
        ipasteTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ipasteTests
